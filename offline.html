<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline | Navigate Germany</title>
  <style>
    body{background:#0a0d14;color:#f1f5f9;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px;max-width:400px}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:8px}
    p{font-size:.88rem;color:#94a3b8;line-height:1.7;margin-bottom:20px}
    .emg{display:flex;flex-direction:column;gap:10px;margin-top:20px}
    .emg a{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;text-decoration:none;font-weight:700;font-size:.9rem}
    .emg112{background:rgba(239,68,68,.15);border:1.5px solid rgba(239,68,68,.4);color:#f87171}
    .emg110{background:rgba(59,130,246,.15);border:1.5px solid rgba(59,130,246,.4);color:#93c5fd}
    .emg116{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.4);color:#4ade80}
    .num{font-size:1.4rem;font-weight:900;direction:ltr;unicode-bidi:isolate}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:3rem;margin-bottom:12px">📵</div>
    <h1>You are offline</h1>
    <p>Navigate Germany works best with an internet connection. Some cached pages may still be available. Emergency numbers are always accessible below.</p>
    <a href="/navigate-germany/" style="display:inline-block;padding:10px 24px;background:#FFCC02;color:#000;border-radius:9px;font-weight:800;text-decoration:none;font-size:.9rem">Try homepage</a>
    <div class="emg">
      <a href="tel:112" class="emg112"><span class="num">112</span><span>Ambulance & Fire — free call</span></a>
      <a href="tel:110" class="emg110"><span class="num">110</span><span>Police — free call</span></a>
      <a href="tel:116117" class="emg116"><span class="num">116117</span><span>Out-of-hours doctor — free</span></a>
    </div>
  </div>
</body>
</html>
