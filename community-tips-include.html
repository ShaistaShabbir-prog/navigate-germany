<!-- Community tips include — add to any module page via:
     fetch('../community-tips.json') and render below content -->
<div id="community-tips-section" style="margin-top:24px" class="card">
  <h2 class="sec-h">💬 Community tips</h2>
  <p style="font-size:.78rem;color:var(--muted);margin-bottom:14px">
    Real tips from immigrants living in Germany. <a href="https://github.com/ShaistaShabbir-prog/navigate-germany/issues/new?title=Community+tip:+[your+city]&body=**City:**%0A**Tip:**%0A**Verified:**+Yes/No" target="_blank" rel="noopener" style="color:var(--accent)">Submit a tip →</a>
  </p>
  <div id="community-tips-list"></div>
</div>
<script>
(async function(){
  try {
    const base = document.querySelector('[href*="index.html"]')?.href?.replace('index.html','') || '../';
    const r = await fetch(base + 'community-tips.json');
    const tips = await r.json();
    const page = location.pathname.split('/').pop().replace('.html','');
    const relevant = tips.filter(t => !t.module || t.module === page || t.module === 'all');
    const el = document.getElementById('community-tips-list');
    if (!el) return;
    if (!relevant.length) { el.innerHTML = '<p style="font-size:.78rem;color:var(--muted)">No community tips yet for this page. Be the first!</p>'; return; }
    el.innerHTML = relevant.slice(0,5).map(t => `
      <div style="padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);margin-bottom:8px">
        <div style="font-size:.82rem;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:6px">${t.tip}</div>
        <div style="font-size:.7rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap">
          ${t.city ? '<span>📍 '+t.city+'</span>' : ''}
          ${t.verified ? '<span style="color:var(--green)">✓ Verified</span>' : ''}
          ${t.date ? '<span>'+t.date+'</span>' : ''}
        </div>
      </div>`).join('');
  } catch(e) { /* silently fail — tips are optional */ }
})();
</script>
